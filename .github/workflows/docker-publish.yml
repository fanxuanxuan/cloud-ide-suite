name: Build and Publish

on:
  push:
    branches: [ "main" ] # 只有推送到 main 分支时才触发

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # 必须开启写入权限才能推送镜像

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} # GitHub 自动生成的 Token，无需手动设置

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # 镜像地址规则：ghcr.io/用户名/仓库名:latest
          tags: ghcr.io/${{ github.repository }}:latest
